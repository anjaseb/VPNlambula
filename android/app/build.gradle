plugins {
id "com.android.application"
id "kotlin-android"
id "dev.flutter.flutter-gradle-plugin"
}

android {
namespace "com.luvita.lambula_vpn"
compileSdk 34
ndkVersion "27.0.12077973"

compileOptions {
sourceCompatibility JavaVersion.VERSION_17
targetCompatibility JavaVersion.VERSION_17
}

kotlinOptions {
jvmTarget = "17"
}

defaultConfig {
applicationId "com.luvita.lambula_vpn"
minSdk 21
targetSdk 34
versionCode 1
versionName "1.0.0"
}

buildTypes {
release {
signingConfig signingConfigs.debug
minifyEnabled true
shrinkResources true
proguardFiles getDefaultProguardFile(
"proguard-android-optimize.txt"), "proguard-rules.pro"
}
debug {
minifyEnabled false
shrinkResources false
}
}

// APK universal — funciona em ARM32 (Itel S17) e ARM64
splits {
abi {
enable false
}
}

packagingOptions {
resources {
excludes += [
"META-INF/LICENSE*",
"META-INF/NOTICE*",
"META-INF/*.kotlin_module",
"**/*.proto",
"**/*.bin",
]
}
}
}

flutter {
source "../.."
}

dependencies {
implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.0"
}