name: lambula_vpn
description: Lambula VPN - LuVita · Eng. Anthony
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SSH real
  dartssh2: ^2.9.0

  # HTTP e rede
  http: ^1.2.0
  web_socket_channel: ^2.4.0

  # Armazenamento local
  shared_preferences: ^2.2.3

  # Notificações e serviço em background
  flutter_local_notifications: ^17.0.0

  # URL launcher (Facebook, etc)
  url_launcher: ^6.2.6

  # Permissões
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true