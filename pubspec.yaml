name: lambula_vpn
description: Lambula VPN - LuVita · Eng. Anthony
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests
  http: ^1.2.1

  # Armazenamento local
  shared_preferences: ^2.2.3

  # Abrir links (Facebook, etc.)
  url_launcher: ^6.3.0

  # Notificações locais (para mensagens do admin)
  flutter_local_notifications: ^17.2.2

  # Firebase Core + Messaging (push notifications do site)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/
