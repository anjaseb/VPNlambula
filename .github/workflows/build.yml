name: Build Lambula VPN APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK Release
        run: flutter build apk --release

      - name: Renomear APK
        run: |
          DATE=$(date +'%Y%m%d')
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/LambulaVPN-v1.0.0-${DATE}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LambulaVPN-APK
          path: build/app/outputs/flutter-apk/LambulaVPN-*.apk
          retention-days: 30

      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/LambulaVPN-*.apk
          name: "Lambula VPN ${{ github.ref_name }}"
          body: |
            ## Lambula VPN ${{ github.ref_name }}
            by LuVita · Eng. Anthony
            Compatível com Android 5.0+
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
